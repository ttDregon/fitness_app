services:
  - type: web
    name: fitness-app-backend
    runtime: python
    plan: free
    pythonVersion: 3.11.7
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DEEPSEEK_API_KEY
        scope: build,runtime
      - key: SUPABASE_URL
        scope: build,runtime
      - key: SUPABASE_KEY
        scope: build,runtime
